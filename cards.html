<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <link rel="stylesheet" href="cards.css">
</head>
<body>

    <div class="HeroSection">
        <img class="avatar" src="Background+Border+Shadow.png" width="160px" height="160px">
        <div class="container">
            <div class="text1">Hello, PlayerOne!</div>
            <div class="text2">Ready for your next adventure? Your friends are currently exploring Brookhaven and Blox Fruits. Jump back in!</div>
            <div class="badge-row">
                <div class="box1">
                    <img class="people" src="Container.png" width="24px" height="12px">
                    <div class="text3">12 Friends Online</div>
                </div>
                <div class="box2">
                    <img class="star" src="Container (1).png" width="20px" height="20px">
                    <div class="text4">Level 42 Architect</div>
                </div>
            </div>
        </div>
    </div>

    <div class="cards-grid">
        <div class="GameCard">
            <img class="GameImage1" src="PictureForGameCard.png">
            <div class="BloxFruits">Blox Fruits</div>
            <div class="rating-row">
                <img class="Like" src="Like.png" width="12px" height="11px">
                <div class="PercentageCount">96%</div>
            </div>
        </div>

        <div class="Card1">
            <img class="CityLife" src="CityLife.png"> 
            <div class="GrayUnderPictureContainer">
                <div class="CityLife2">City Life 2</div>
                <div class="card-bottom-row">
                    <div class="rating-group">
                        <img class="Like2" src="Like.png" width="10px" height="10px">
                        <div class="PercentageCount2">98%</div>
                    </div>
                    <div class="ActivePlayers">4.2K Active</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
